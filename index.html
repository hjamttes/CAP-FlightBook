<!DOCTYPE html>
<html lang="" en">

<head>
  <meta charset="" UTF-8">
  <meta name="" viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="" theme-color" content="" #1a3a6b">
  <title>Flight Logbook</title>
  <link rel="" stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
  <style>
    :root {
      --navy: #1a3a6b;
      --navy-dark: #122b52;
      --green: #2d7a3a;
      --red: #a32d2d;
      --bg: #f4f4f2;
      --surface: #ffffff;
      --surface2: #f0f0ee;
      --border: rgba(0, 0, 0, 0.1);
      --border-mid: rgba(0, 0, 0, 0.18);
      --text: #1a1a1a;
      --text2: #666;
      --text3: #999;
      --radius: 12px;
      --radius-sm: 8px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111214;
        --surface: #1c1d1f;
        --surface2: #252628;
        --border: rgba(255, 255, 255, 0.08);
        --border-mid: rgba(255, 255, 255, 0.14);
        --text: #f0f0ee;
        --text2: #9a9a9a;
        --text3: #666;
      }
    }

    * box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    html,
    body height: 100%;
    overflow: hidden;
    body font-family: -apple-system,
    BlinkMacSystemFont,
    'SF Pro Text',
    'Segoe UI',
    sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    .app display: flex;
    flex-direction: column;
    height: 100vh;
    height: 100dvh;
    .topbar background: var(--surface);
    border-bottom: 0.5px solid var(--border);
    padding: 0 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    height: 54px;
    flex-shrink: 0;
    padding-top: env(safe-area-inset-top, 0);

    .logo-badge {
      background: var(--navy);
      color: #fff;
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    .topbar-title font-size: 15px;
    font-weight: 600;
    .topbar-right margin-left: auto;
    .scroll-area flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    overscroll-behavior: contain;
    padding-bottom: calc(20px + var(--safe-bottom));
    .content padding: 14px;
    max-width: 700px;
    margin: 0 auto;
    /* Summary header */
    .summary-card background: linear-gradient(135deg, var(--navy), #2a5798);
    color: #fff;
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 14px;
    .summary-top display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 4px;
    .summary-hours font-size: 32px;
    font-weight: 700;
    line-height: 1;
    .summary-label font-size: 12px;
    opacity: 0.8;
    .summary-stats display: flex;
    gap: 18px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 0.5px solid rgba(255, 255, 255, 0.25);

    .summary-stat {
      flex: 1;
    }

    .summary-stat-val font-size: 16px;
    font-weight: 600;

    .summary-stat-label {
      font-size: 11px;
      opacity: 0.75;
      margin-top: 1px;
    }

    .sec-row display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    .sec-title font-size: 17px;
    font-weight: 600;
    .sec-sub font-size: 12px;
    color: var(--text2);
    margin-top: 1px;

    /* Buttons */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 9px 14px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border-mid);
      background: var(--surface);
      cursor: pointer;
      font-size: 14px;
      color: var(--text);
      font-family: inherit;
    }

    .btn:active opacity: 0.7;
    .btn-primary background: var(--navy);
    color: #fff;
    border-color: var(--navy);
    font-weight: 500;
    .btn-primary:active background: var(--navy-dark);
    .btn-sm padding: 6px 11px;
    font-size: 13px;
    .btn-danger color: var(--red);

    .btn-full {
      width: 100%;
      justify-content: center;
      font-size: 15px;
      padding: 13px;
    }

    .fab {
      position: fixed;
      bottom: calc(20px + var(--safe-bottom));
      right: 16px;
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: var(--navy);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 3px 14px rgba(26, 58, 107, 0.4);
      z-index: 15;
    }

    .fab:active background: var(--navy-dark);
    /* Log items */
    .log-list display: flex;
    flex-direction: column;
    gap: 9px;
    .log-item background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 13px 15px;

    .log-top {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 5px;
    }

    .log-date font-size: 11.5px;
    color: var(--text2);
    font-weight: 500;
    .log-aircraft font-size: 14.5px;
    font-weight: 600;
    flex: 1;
    .log-hrs font-size: 17px;
    font-weight: 700;
    color: var(--navy);
    @media (prefers-color-scheme: dark) .log-hrs {
      color: #6e9fd4;
    }

    .log-route {
      font-size: 12.5px;
      color: var(--text2);
      margin-bottom: 7px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .log-tags display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
    .badge display: inline-flex;
    align-items: center;
    padding: 3px 8px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 600;

    .b-dual {
      background: #ede8fd;
      color: #3c2e99;
    }

    .b-solo background: #fef0d6;
    color: #7a3d00;
    .b-xc background: #fde8f0;
    color: #7a1e40;
    .b-night background: #2a2a2a;
    color: #ccc;
    .b-inst background: #e0f0fa;
    color: #14506e;
    .b-sim background: var(--surface2);
    color: var(--text2);
    @media (prefers-color-scheme: dark) {
      .b-dual {
        background: #2a1f5c;
        color: #b0a2f0;
      }

      .b-solo background: #4a2800;
      color: #f5c06a;
      .b-xc background: #4a0e22;
      color: #f0809a;

      .b-inst {
        background: #0d3a52;
        color: #7ec3ea;
      }
    }

    .log-actions margin-left: auto;
    display: flex;
    gap: 4px;

    .log-notes {
      font-size: 12.5px;
      color: var(--text2);
      margin-top: 9px;
      padding-top: 9px;
      border-top: 0.5px solid var(--border);
      line-height: 1.4;
    }

    /* Form */
    .sheet-overlay position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.4);
    z-index: 50;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    .sheet background: var(--surface);
    border-radius: 18px 18px 0 0;
    max-height: 92vh;
    overflow-y: auto;
    padding: 0 16px calc(16px + var(--safe-bottom));
    -webkit-overflow-scrolling: touch;

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: var(--border-mid);
      border-radius: 2px;
      margin: 10px auto 14px;
    }

    .sheet-title font-size: 17px;
    font-weight: 700;
    margin-bottom: 16px;
    .form-group margin-bottom: 12px;

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: : var(--text2);
      margin-bottom: 5px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      font-size: 15px;
      border-radius: var(--radius-sm);
      border: 0.5px solid var(--border-mid);
      padding: 10px 12px;
      background: var(--surface2);
      color: var(--text);
      font-family: inherit;
      appearance: none;
      -webkit-appearance: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      outline: 2px solid var(--navy);
      outline-offset: 1px;
    }

    .form-2 display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;

    .form-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .form-divider font-size: 11px;
    font-weight: 700;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin: 16px 0 10px;
    .form-actions display: flex;
    gap: 8px;
    margin-top: 16px;

    .form-actions .btn {
      flex: 1;
      justify-content: center;
    }

    .empty text-align: center;
    padding: 60px 24px;
    color: var(--text2);

    .empty i {
      font-size: 44px;
      margin-bottom: 14px;
      display: block;
      opacity: 0.4;
    }

    .empty p font-size: 14px;
    line-height: 1.5;
    .footer-actions display: flex;
    gap: 8px;
    padding: 16px 14px 4px;
    max-width: 700px;
    margin: 0 auto;
    .footer-actions .btn flex: 1;
    justify-content: center;
    font-size: 13px;
    @media print {
      .fab,
      .footer-actions,
      .no-print display: none !important;
      body overflow: auto;
    }
  </style>
</head>

<body>
  <div class="" app" id="app"></div>

  <script>
    function loadState() {
      try { const r = localStorage.getItem('simple_logbook_v1'); return r ? JSON.parse(r) : null; } catch (e)  return null;
    }
    let S = loadState() || { logs: [], nid: 1 };
    let MODAL = null, FD = {};

    function save() { try { localStorage.setItem('simple_logbook_v1', JSON.stringify(S)); } catch (e) { } }
    function today() { return new Date().toISOString().slice(0, 10); }
    function f(n)  return (+n || 0).toFixed(1); function g(id)  const e = document.getElementById(id); return e ? e.value : '';
    function totals() {
      const t = { total: 0, dual: 0, solo: 0, xc: 0, night: 0, instrument: 0, entries: 0 };
      S.logs.forEach(l => {
        t.total += +l.total || 0; t.dual += +l.dual || 0; t.solo += +l.solo || 0;
        t.xc += +l.xc || 0; t.night += +l.night || 0; t.instrument += +l.instrument || 0;
        t.entries++;
      });
      return t;=
      "summary-card" >
      <div class="summary-top">
                <span class="summary-hours">${f(t.total)}</span>
                        <span class="summary-label">${t.entries} ${t.entries===1?'entry':'entries'}</span>      </div>      <div class="summary-label">TOTAL FLIGHT HOURS</div>      <div class="summary-stats">
                                    <div class="summary-stat"><div class="summary-stat-val">${f(t.dual)}</div><div class="summary-stat-label">Dual</div></div>        <div class="summary-stat"><div class="summary-stat-val">${f(t.solo)}</div><div class="summary-stat-label">Solo</div></div>        <div class="summary-stat"><div class="summary-stat-val">${f(t.xc)}</div><div class="summary-stat-label">XC</div></div>
                                            <div class="summary-stat"><div class="summary-stat-val">${f(t.night)}</div><div class="summary-stat-label">Night</div></div>
                                                  </div>
                                                      </div >

        ${
          sorted.length === 0
          ? `<div class="empty"><i class="ti ti-plane-off" aria-hidden="true"></i><p>No flights logged yet.<br>Tap the + button to add your first entry.</p></div>`
          : `<div class="log-list">${sorted.map(logItem).join('')}</div>`
      }
                                                            </div > `;
                                                        }

                                                        function rModal() {
                                                              const isEdit = !!FD.id;
                                                                return `< div class="sheet-overlay" onclick = "if(event.target===this)closeModal()" >
        <div class="sheet">
          <div class="sheet-handle"></div>
          <div class="sheet-title">${isEdit ? 'Edit flight' : 'Log a flight'}</div>
          <div class="form-2">
            <div class="form-group"><label>Date *</label><input type="date" id="f_date" value="${FD.date||today()}"></div>
            <div class="form-group"><label>Total hours *</label><input type="number" id="f_total" value="${FD.total||''}" min="0" max="24" step="0.1" placeholder="0.0" inputmode="decimal"></div>
          </div>      <div class="form-group"><label>Aircraft</label><input type="text" id="f_aircraft" value="${FD.aircraft||''}" placeholder="N-number / type" autocapitalize="characters"></div>
          <div class="form-group"><label>Route</label><input type="text" id="f_route" value="${FD.route||''}" placeholder="e.g. KAUS  KSAT" autocapitalize="characters"></div>

          <div class="form-divider">Hour breakdown (optional)</div>      <div class="form-3">
            <div class="form-group"><label>Dual</label><input type="number" id="f_dual" value="${FD.dual||''}" min="0" step="0.1" placeholder="0.0" inputmode="decimal"></div>
            <div class="form-group"><label>Solo</label><input type="number" id="f_solo" value="${FD.solo||''}" min="0" step="0.1" placeholder="0.0" inputmode="decimal"></div>
            <div class="form-group"><label>XC</label><input type="number" id="f_xc" value="${FD.xc||''}" min="0" step="0.1" placeholder="0.0" inputmode="decimal"></div>
            <div class="form-group"><label>Night</label><input type="number" id="f_night" value="${FD.night||''}" min="0" step="0.1" placeholder="0.0" inputmode="decimal"></div>
            <div class="form-group"><label>Instrument</label><input type="number" id="f_instrument" value="${FD.instrument||''}" min
              function logItem(l) {
                                                                                                          return `<div class="log-item">
                <div class="log-top">
                  <span class="log-date">${l.date}</span>
                  <span class="log-aircraft">${l.aircraft || ''}</span>
                  <span class="log-hrs">${f(l.total)}</span>
                </div>
                ${l.route ? `<div class="log-route"><i class="ti ti-route" style="font-size:13px;" aria-hidden="true"></i> ${l.route}</div>` : ''}
                <div class="log-tags">
                  ${(+l.dual > 0) ? `<span class="badge b-dual">Dual ${f(l.dual)}</span>` : ''}
                  ${(+l.solo > 0) ? `<span class="badge b-solo">Solo ${f(l.solo)}</span>` : ''}
                  ${(+l.xc > 0) ? `<span class="badge b-xc">XC ${f(l.xc)}</span>` : ''}
                  ${(+l.night > 0) ? `<span class="badge b-night">Night ${f(l.night)}</span>` : ''}
                  ${(+l.instrument > 0) ? `<span class="badge b-inst">Inst ${f(l.instrument)}</span>` : ''}
                  <span style="flex:1"></span>
                  <div class="log-actions no-print">
                    <button class="btn btn-sm" onclick="openEdit('${l.id}')"><i class="ti ti-edit" aria-hidden="true"></i></button>
                    <button class="btn btn-sm btn-danger" onclick="delEntry('${l.id}')"><i class="ti ti-trash" aria-hidden="true"></i></button>
                  </div>
                </div>
                ${l.instructor ? `<div class="log-notes"><strong>Instructor:</strong> ${l.instructor}${l.notes ? '  ' + l.notes : ''}</div>` : (l.notes ? `<div class="log-notes">${l.notes}</div>` : '')}
              </div>`;
                                                                                                                                                                                                                            }

              function rLogbook() {
                                                                                                                                                                                                                                  const t = totals();
                                                                                                                                                                                                                                    const sorted = S.logs.slice().sort((a,b)=>b.date.localeCompare(a.date));
              return `<div class="content">
                <div classn="0" step="0.1" placeholder="0.0" inputmode="decimal"></div>        <div class="form-group"><label>Landings</label><input type="number" id="f_landings" value="${FD.landings||''}" min="0" step="1" placeholder="0" inputmode="numeric"></div>      </div>
              <div class="form-group"><label>Instructor</label><input type="text" id="f_instructor" value="${FD.instructor||''}" placeholder="Name (leave blank if solo)" autocapitalize="words"></div>
              <div class="form-group"><label>Notes</label><textarea id="f_notes" rows="3" style="resize:vertical;">${FD.notes || ''}</textarea></div>
              <div class="form-actions">
                <button class="btn" onclick="closeModal()">Cancel</button>        <button class="btn btn-primary" onclick="saveEntry()">${isEdit ? 'Save changes' : 'Log flight'}</button>      </div>    </div>  </div>`;
                                                                                                                                                                                                                                                              }

          function openAdd() {MODAL = 'add'; FD={date:today()}; render(); }
          function openEdit(id) { const e=S.logs.find(l=>l.id===id); if(!e)return; MODAL='add'; FD={...e}; render(); }
          function closeModal() {MODAL = null; FD={ }; render(); }

          function saveEntry() {
                                                                                                                                                                                                                                                                  const total = parseFloat(g('f_total'));
          if (!g('f_date') || isNaN(total)) {alert('Date and total hours are required.'); return; }
          const entry = {
            id: FD.id || String(S.nid++),
          date: g('f_date'), aircraft: g('f_aircraft'), route: g('f_route'), total,
          dual: +g('f_dual')||0, solo: +g('f_solo')||0, xc: +g('f_xc')||0,
          night: +g('f_night')||0, instrument: +g('f_instrument')||0,
          landings: +g('f_landings')||0, instructor: g('f_instructor'), notes: g('f_notes')
                                                                                                                                                                                                                                                                      };
          if (FD.id) {S.logs = S.logs.map(l => l.id === FD.id ? entry : l); }
          else {S.logs.push(entry); }
          save(); MODAL=null; FD={ }; render();
                                                                                                                                                                                                                                                                    }

          function delEntry(id) {
                                                                                                                                                                                                                                                                        if (!confirm('Delete this flight entry?')) return;
                                                                                                                                                                                                                                                                          S.logs = S.logs.filter(l => l.id !== id);
          save(); render();
                                                                                                                                                                                                                                                                    }

          function exportData() {
                                                                                                                                                                                                                                                                        const b = new Blob([JSON.stringify(S,null,2)], {type:'application/json'});
          const a = document.createElement('a');
          a.href = URL.createObjectURL(b);
          a.download = `flight_logbook_${today()}.json`;
          a.click();
                                                                                                                                                                                                                                                                    }

          function importData(e) {
                                                                                                                                                                                                                                                                        const file = e.target.files[0]; if (!file) return;
          const r = new FileReader();
                                                                                                                                                                                                                                                                            r.onload = ev => {
                                                                                                                                                                                                                                                                                  try {
                                                                                                                                                                                                                                                                                          const d = JSON.parse(ev.target.result);
          if (!d.logs) {alert('Invalid logbook file.'); return; }
                                                                                                                                                                                                                                                                                                      const ids = new Set(S.logs.map(l=>l.id));
                                                                                                                                                                                                                                                                                                            const nl = d.logs.filter(l=>!ids.has(l.id));
          S.logs = [...S.logs, ...nl];
                                                                                                                                                                                                                                                                                                                        S.nid = Math.max(S.nid, ...S.logs.map(l=>+l.id||0)) + 1;
          save(); render();
          alert(`Imported ${nl.length} new entries.`);
                                                                                                                                                                                                                                                                                  } catch(err) {alert('Could not read file.'); }
                                                                                                                                                                                                                                                                                };
          r.readAsText(file);
                                                                                                                                                                                                                                                                              }

          function printLog()  window.print();
          function render() {
            document.getElementById('app').innerHTML = `
                                                                                                                                                                                                                                                                                      <div class="topbar">
                                                                                                                                                                                                                                                                                              <span class="logo-badge">LOG</span>
                                                                                                                                                                                                                                                                                                    <span class="topbar-title">Flight Logbook</span>
                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                            <div class="scroll-area">
                                                                                                                                                                                                                                                                                                                    ${rLogbook()}
                                                                                                                                                                                                                                                                                                                          <div class="footer-actions no-print">
                                                                                                                                                                                                                                                                                                                                    <button class="btn" onclick="exportData()"><i class="ti ti-download" aria-hidden="true"></i> Export</button>
                                                                                                                                                                                                                                                                                                                                            <label class="btn" style="cursor:pointer;"><i class="ti ti-upload" aria-hidden="true"></i> Import<input type="file" accept=".json" style="display:none;" onchange="importData(event)"></label>
                                                                                                                                                                                                                                                                                                                                                    <button class="btn" onclick="printLog()"><i class="ti ti-printer" aria-hidden="true"></i> Print</button>
                                                                                                                                                                                                                                                                                                                                                          </div>
                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                  <button class="fab no-print" onclick="openAdd()" aria-label="Log flight"><i class="ti ti-plus"></i></button>
                                                                                                                                                                                                                                                                                                                                                                      ${MODAL ? rModal() : ''}
                                                                                                                                                                                                                                                                                                                                                                        `;
                                                                                                                                                                                                                                                                                                                                                            }

          render();
  </script>
</body>

</html>
